name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  container-smoke:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build memoforge-http container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.http
          platforms: linux/amd64
          push: false
          load: false
          provenance: false
          tags: memoforge-http:ci

      - name: Build memoforge-mcp container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.mcp
          platforms: linux/amd64
          push: false
          load: false
          provenance: false
          tags: memoforge-mcp:ci

  frontend:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  integration:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      MEMOFORGE_HTTP_BIN: ${{ github.workspace }}/target/debug/memoforge-http
      MEMOFORGE_MCP_BIN: ${{ github.workspace }}/target/debug/memoforge
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Prebuild integration binaries
        run: cargo build -p memoforge-http -p memoforge-mcp

      - name: Run frontend E2E
        run: python3 tests/frontend_e2e.py

      - name: Run frontend ops E2E
        run: python3 tests/frontend_ops_e2e.py

      - name: Run MCP E2E
        run: python3 tests/mcp_e2e.py
