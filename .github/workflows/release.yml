name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing Git tag to build and publish, e.g. v0.1.0-alpha.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
    steps:
      - name: Resolve release ref
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"

            if [[ -z "$tag" ]]; then
              echo "::error::workflow_dispatch requires an existing tag name, for example v0.1.0-alpha.1"
              exit 1
            fi

            if ! git ls-remote --exit-code --refs "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git" "refs/tags/${tag}" >/dev/null; then
              echo "::error::Tag '${tag}' was not found in ${REPOSITORY}. Use an existing Git tag."
              exit 1
            fi

            checkout_ref="refs/tags/${tag}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="$GITHUB_REF_NAME"
            checkout_ref="$GITHUB_REF"
          else
            echo "::error::Release workflow must run from a tag push or workflow_dispatch."
            exit 1
          fi

          prerelease="false"
          if [[ "$tag" == *-* ]]; then
            prerelease="true"
          fi

          echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=${checkout_ref}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
            target: 'x86_64-pc-windows-msvc'
            portable_asset_name: 'memoforge-windows-x64-portable'
            portable_asset_file: 'MemoForge_x64_portable.exe'
          - platform: 'ubuntu-22.04'
            args: ''
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'ubuntu-22.04-arm'
            args: ''
            target: 'aarch64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev xdg-utils

      - name: Install OpenSSL (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './crates/memoforge-tauri -> target'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          releaseName: 'MemoForge ${{ needs.prepare-release.outputs.tag_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          projectPath: './crates/memoforge-tauri'
          args: ${{ matrix.args }}

      - name: Prepare portable Windows executable
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/memoforge-tauri.exe" "dist/${{ matrix.portable_asset_file }}"

      - name: Upload portable Windows executable
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.portable_asset_name }}
          path: dist/${{ matrix.portable_asset_file }}

  # Build MCP Server for multiple platforms
  build-mcp:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: memoforge
            asset_name: memoforge-darwin-arm64
            asset_file: memoforge-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: memoforge
            asset_name: memoforge-darwin-x64
            asset_file: memoforge-darwin-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: memoforge.exe
            asset_name: memoforge-windows-x64
            asset_file: memoforge-windows-x64.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact_name: memoforge
            asset_name: memoforge-linux-x64
            asset_file: memoforge-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            artifact_name: memoforge
            asset_name: memoforge-linux-arm64
            asset_file: memoforge-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install OpenSSL (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Build MCP Server
        run: cargo build --release -p memoforge-mcp --target ${{ matrix.target }}

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_file }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_file }}

  release-mcp:
    needs: [prepare-release, build, build-mcp]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          files: artifacts/**/*
          draft: false
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
